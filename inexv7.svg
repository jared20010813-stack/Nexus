<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  width="100vw"
  height="100vh"
  preserveAspectRatio="none">

  <foreignObject x="0" y="0" width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml"
      style="margin:0;width:100vw;height:100vh;font-family:system-ui,sans-serif;background:#0a0f1c;color:#e2e8f0;display:flex;flex-direction:column;overflow:hidden;">

      <style>
        header{
          background:#111827;
          padding:14px 24px;
          border-bottom:1px solid #1e2937;
          font-size:1.4rem;
          font-weight:700;
          color:#60a5fa;
        }

        .main{
          flex:1;
          display:flex;
        }

        .sidebar{
          width:260px;
          background:#111827;
          padding:16px;
          border-right:1px solid #1e2937;
        }

        .game{
          padding:14px;
          background:#1e2937;
          border-radius:10px;
          cursor:pointer;
          margin-top:8px;
          text-align:center;
        }

        .game:hover{
          background:#334155;
        }

        .screen{
          flex:1;
          display:flex;
          align-items:center;
          justify-content:center;
          background:#0f172a;
        }

        iframe{
          width:95%;
          height:95%;
          border:none;
          border-radius:12px;
          background:white;
        }

        .hint{
          margin-top:12px;
          font-size:0.85rem;
          color:#64748b;
        }
      </style>

      <header>
        NexusForge
      </header>

      <div class="main">
        <div class="sidebar">
          <div class="game" onclick="loadGame('https://ubg100.github.io/drive-mad/')">
            🚗 Drive Mad
          </div>

          <div class="hint">
            Click to play
          </div>
        </div>

        <div class="screen">
          <iframe id="gameFrame" src=""></iframe>
        </div>
      </div>

      <script><![CDATA[
        function loadGame(url){
          document.getElementById('gameFrame').src = url;
        }
      ]]></script>

    </body>
  </foreignObject>
</svg>
